[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
buildTarget = "production"

[deploy]
startCommand = 'sh -c "uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers"'
healthcheckPath = "/health/live"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
preDeployCommand = "alembic upgrade head && python -m app.seed_demo_data"
