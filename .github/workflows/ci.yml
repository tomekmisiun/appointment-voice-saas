name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  policy-guards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}"

      - name: Run policy guards
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash scripts/ci/run_policy_guards.sh

  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    needs:
      - pre-commit
      - policy-guards
    env:
      TEST_DATABASE_URL: postgresql://app_user:app_password@localhost:5433/app_test_db
      SECRET_KEY: test-secret-key-for-ci-only
      ENVIRONMENT: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: uploads
      S3_REGION_NAME: us-east-1
      COVERAGE_FILE: /tmp/.coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Create env file for compose
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
          TEST_DATABASE_URL=postgresql://app_user:app_password@test_db:5432/app_test_db
          SECRET_KEY=test-secret-key-for-ci-only
          S3_ACCESS_KEY_ID=minioadmin
          S3_SECRET_ACCESS_KEY=minioadmin
          EOF

      - name: Start test dependencies
        run: docker compose up -d db test_db redis minio

      - name: Prepare app database for backup rehearsal
        run: docker compose run --rm api alembic upgrade head

      - name: Rehearse database backup and restore
        run: |
          make db-backup
          make db-restore-check

      - name: Show dependency containers
        run: docker compose ps

      - name: Run tests with coverage
        run: |
          uv run pytest \
            -n 2 \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Stop containers
        if: always()
        run: docker compose down

  load-smoke:
    runs-on: ubuntu-latest
    needs:
      - pre-commit
      - policy-guards

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Create env file for compose
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
          TEST_DATABASE_URL=postgresql://app_user:app_password@test_db:5432/app_test_db
          SECRET_KEY=test-secret-key-for-ci-only
          S3_ACCESS_KEY_ID=minioadmin
          S3_SECRET_ACCESS_KEY=minioadmin
          EOF

      - name: Start API stack for load smoke
        run: docker compose up -d db redis api

      - name: Wait for API health
        run: |
          for attempt in $(seq 1 30); do
            if docker compose exec -T api python -c "import httpx; httpx.get('http://api:8000/health', timeout=2).raise_for_status()"; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run load threshold smoke check
        run: |
          docker compose run --rm api python -m perf.load_baseline \
            --base-url http://api:8000 \
            --profile health \
            --check-thresholds \
            --requests 30 \
            --concurrency 3

      - name: Stop containers
        if: always()
        run: docker compose down

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: production
          push: false
          load: true
          tags: |
            fastapi-production-foundation-api:ci-${{ github.sha }}
            fastapi-production-foundation-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify production image excludes dev dependencies
        run: |
          docker run --rm \
            -e SECRET_KEY=test-secret-key-for-ci-only \
            -e ENVIRONMENT=test \
            fastapi-production-foundation-api:latest \
            python -c "import importlib.util; assert importlib.util.find_spec('pytest') is None"

          docker run --rm \
            -e SECRET_KEY=test-secret-key-for-ci-only \
            -e ENVIRONMENT=test \
            fastapi-production-foundation-api:latest \
            python -c "import fastapi, uvicorn, app.main"

          docker run --rm \
            fastapi-production-foundation-api:latest \
            python -c "import sys; assert sys.version_info[:2] == (3, 13), sys.version"

      - name: Enforce Trivy policy on API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: fastapi-production-foundation-api:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        continue-on-error: true
        with:
          image-ref: fastapi-production-foundation-api:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  frontend-validate:
    runs-on: ubuntu-latest
    needs:
      - pre-commit

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '11.8.0'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (production)
        run: pnpm build

  public-demo-contract:
    runs-on: ubuntu-latest
    needs:
      - pre-commit
      - policy-guards
    env:
      TEST_DATABASE_URL: postgresql://app_user:app_password@localhost:5433/app_test_db
      SECRET_KEY: test-secret-key-for-ci-only
      ENVIRONMENT: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: uploads
      S3_REGION_NAME: us-east-1
      COVERAGE_FILE: /tmp/.coverage

    services:
      test_db:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
          POSTGRES_DB: app_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U app_user -d app_test_db"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      minio:
        image: minio/minio:edge
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd="curl -sf http://localhost:9000/minio/health/live"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
        command: server /data

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run demo contract tests
        run: |
          uv run pytest \
            tests/test_public_demo.py \
            tests/test_avs_j001_seed_demo.py \
            -v --tb=short

  deploy-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - pre-commit
      - policy-guards
      - secrets-scan
      - test
      - load-smoke
      - docker-build
      - frontend-validate
      - public-demo-contract

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Railway CLI v5.23.1
        run: |
          gh release download v5.23.1 \
            --repo railwayapp/cli \
            --pattern 'railway-v5.23.1-x86_64-unknown-linux-musl.tar.gz' \
            --output /tmp/railway.tar.gz
          tar -xzf /tmp/railway.tar.gz -C /usr/local/bin railway
          railway --version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate RAILWAY_TOKEN is configured
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "::error::RAILWAY_TOKEN secret is not configured. See .github/DEPLOY.md for setup instructions."
            exit 1
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy API to production (waits for migrations)
        run: |
          cp railway.api.toml railway.toml
          railway up --service=api --ci
          rm -f railway.toml
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy worker to production
        run: |
          cp railway.worker.toml railway.toml
          railway up --service=worker --ci --detach
          rm -f railway.toml
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend to production
        run: railway up --service=frontend --ci --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
